<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Slideshow</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #808080;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
      }

      .slideshow-container {
        max-width: 900px;
        width: 100%;
        background: #2a2a2a;
        border-radius: 12px;
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        overflow: hidden;
        border: 2px solid rgba(255, 255, 255, 0.2);
      }

      .slides-wrapper {
        position: relative;
        width: 100%;
        padding-bottom: 66.67%;
        background: #1a1a1a;
        overflow: hidden;
      }

      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.8s ease-in-out;
      }

      .slide.active {
        opacity: 1;
      }

      .slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .prev,
      .next {
        cursor: pointer;
        position: absolute;
        top: 50%;
        width: auto;
        margin-top: -22px;
        padding: 16px;
        color: #ffffff;
        background: rgba(80, 80, 80, 0.6);
        font-weight: bold;
        font-size: 18px;
        transition: 0.3s ease;
        border-radius: 3px;
        user-select: none;
        z-index: 100;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .next {
        right: 0;
      }

      .prev {
        left: 0;
      }

      .prev:hover,
      .next:hover {
        background: rgba(60, 60, 60, 0.9);
        color: #ffffff;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
      }

      .controls {
        background: #2a2a2a;
        padding: 20px;
        text-align: center;
      }

      .dots-container {
        display: flex;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .dot {
        cursor: pointer;
        height: 12px;
        width: 12px;
        margin: 0 5px;
        background-color: #555555;
        border-radius: 50%;
        display: inline-block;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .dot.active {
        background-color: #ffffff;
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
      }

      .dot:hover {
        background-color: #888888;
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      }

      .slide-counter {
        color: #cccccc;
        font-size: 14px;
        margin-top: 12px;
        font-weight: 500;
        letter-spacing: 1px;
      }

      .controls button {
        background: #3a3a3a;
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 10px 20px;
        margin: 0 5px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s ease;
        font-weight: 500;
      }

      .controls button:hover {
        background: #4a4a4a;
        color: #ffffff;
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
      }

      .controls button.active {
        background: #555555;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      }

      .title-bar {
        background: #1a1a1a;
        padding: 20px;
        text-align: center;
        border-bottom: 2px solid rgba(255, 255, 255, 0.2);
      }

      .title-bar h1 {
        color: #ffffff;
        font-size: 32px;
        font-weight: bold;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="slideshow-container">
      <div class="title-bar">
        <h1>Images</h1>
      </div>
      <div class="slides-wrapper" id="slidesWrapper">
        <div class="slide active">
          <img src="Assets/IMG_3150.JPG" alt="Slide 1" />
        </div>
        <div class="slide">
          <img src="Assets/IMG_3157.JPG" alt="Slide 2" />
        </div>
        <div class="slide">
          <img src="Assets/IMG_3160.JPG" alt="Slide 3" />
        </div>
        <div class="slide">
          <img src="Assets/IMG_3171.JPG" alt="Slide 4" />
        </div>
        <div class="slide">
          <img src="Assets/IMG_3187.JPG" alt="Slide 5" />
        </div>
        <div class="slide">
          <img src="Assets/IMG_7292.JPG" alt="Slide 6" />
        </div>
        <div class="slide">
          <img src="Assets/IMG_7294.JPG" alt="Slide 7" />
        </div>
        <div class="slide">
          <img src="Assets/IMG_7303.JPG" alt="Slide 8" />
        </div>
        <div class="slide">
          <img src="Assets/IMG_7307.JPG" alt="Slide 9" />
        </div>
        <div class="slide">
          <img src="Assets/IMG_7320.JPG" alt="Slide 10" />
        </div>
        <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
        <a class="next" onclick="changeSlide(1)">&#10095;</a>
      </div>

      <div class="controls">
        <div class="dots-container" id="dotsContainer"></div>
        <div class="slide-counter">
          <span id="currentSlide">1</span> / <span id="totalSlides">10</span>
        </div>
        <div style="margin-top: 15px">
          <button id="playBtn" onclick="toggleAutoPlay()">Play</button>
          <button onclick="changeSlide(-1)">← Previous</button>
          <button onclick="changeSlide(1)">Next →</button>
        </div>
      </div>
    </div>

    <script>
      let currentSlide = 1;
      const totalSlides = document.querySelectorAll(".slide").length;
      let autoPlayActive = false;
      let autoPlayInterval;

      // Initialize dots
      const dotsContainer = document.getElementById("dotsContainer");
      for (let i = 1; i <= totalSlides; i++) {
        const dot = document.createElement("span");
        dot.className = "dot" + (i === 1 ? " active" : "");
        dot.onclick = () => goToSlide(i);
        dotsContainer.appendChild(dot);
      }

      document.getElementById("totalSlides").textContent = totalSlides;

      function changeSlide(n) {
        goToSlide(currentSlide + n);
      }

      function goToSlide(n) {
        const slides = document.querySelectorAll(".slide");
        const dots = document.querySelectorAll(".dot");

        if (n > totalSlides) {
          currentSlide = 1;
        } else if (n < 1) {
          currentSlide = totalSlides;
        } else {
          currentSlide = n;
        }

        slides.forEach((slide) => slide.classList.remove("active"));
        dots.forEach((dot) => dot.classList.remove("active"));

        slides[currentSlide - 1].classList.add("active");
        dots[currentSlide - 1].classList.add("active");

        document.getElementById("currentSlide").textContent = currentSlide;
      }

      function toggleAutoPlay() {
        const playBtn = document.getElementById("playBtn");
        autoPlayActive = !autoPlayActive;

        if (autoPlayActive) {
          playBtn.textContent = "Pause";
          playBtn.classList.add("active");
          autoPlayInterval = setInterval(() => {
            changeSlide(1);
          }, 4000);
        } else {
          playBtn.textContent = "Play";
          playBtn.classList.remove("active");
          clearInterval(autoPlayInterval);
        }
      }
    </script>
  </body>
</html>
